name: Test
on:
  push:
    branches:
      - main
  pull_request:

env:
  LOG_LEVEL: debug

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  preset:
    name: Preset validation
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: .nvmrc

      - name: Run tests
        run: npx --yes --package=renovate@43.262.2 --call './test/run.sh'

  required-checks-pass:
    name: Required checks pass
    if: always()
    needs:
      - preset
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Verify required jobs
        env:
          PRESET_RESULT: ${{ needs.preset.result }}
        run: |
          if [[ "$PRESET_RESULT" != "success" ]]; then
            echo "::error::Preset validation finished with result: $PRESET_RESULT"
            exit 1
          fi
